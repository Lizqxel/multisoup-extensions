<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta http-equiv="content-style-type" content="text/css"/>
    <meta http-equiv="content-script-type" content="text/javascript"/>
    <link rel="shortcut icon" type="image/vnd.microsoft.icon" href="img/favicon.ico"/>
    <link rel="icon" type="image/vnd.microsoft.icon" href="img/favicon.ico"/>
    <link rel="stylesheet" type="text/css" href="css/custom-theme/jquery-ui-1.9.2.custom.min.css">
	<link rel="stylesheet" type="text/css" href="js/OpenLayers/theme/default/style.css">
    <link rel="stylesheet" type="text/css" href="css/default.css">
    <script type="text/javascript" src="js/jquery-1.8.2.js"></script>
    <script type="text/javascript" src="js/jquery-ui-1.9.2.custom.min.js"></script>
    <script type="text/javascript" src="js/OpenLayers/OpenLayers.js"></script>
    <script type="text/javascript" src="js/map.js"></script>
	<title>NTT空間情報 GEOSPACE CDS|マルティスープ株式会社</title>
	<style type="text/css">
		#omap { border: 1px solid #bfe3c7; display: none;}
		#menu {
			position:absolute;
			right:20px;
			top:10px;
			padding: 0px;
			z-index: 1000;
			opacity: 0.95; 
			filter: alpha(opacity=95); 
			text-align:center;
			background-color: #7291ad;
			color: #f2f2f2;
		}
	</style>
</head>
<body style="overflow:hidden;background:#ffffff;">
	<div id="menu">
		<input type="radio" id="road" name="map" value="GeospaceRoad" class="menu-button" checked /><label for="road">電子地図</label>
		<input type="radio" id="aerial" name="map" value="GeospaceAerial" class="menu-button" /><label for="aerial">航空写真</label>
	</div>
	<div id="omap" style="width:1200px; height:600px;"></div>
</body>
</html>
<script type="text/javascript">
	var omapControl = OMapControl();
	$(document).ready(function() {
		$(".menu-button").button();
		$("#menu").buttonset();
		$(".menu-button").click(function() {
			var val = $("input:radio[name='map']:checked").val();
			omapControl.changeBaseLayer(val);
		});
		omapControl.init("omap");
		var map = omapControl.getMap();
		var callback = function() {
			omapControl.setCenter(THE_APP.DEFAULT_MAP_POS.lon, THE_APP.DEFAULT_MAP_POS.lat, 16);
			omapControl.layout();
			omapControl.show();
		};
		var gsMap = GSMap();
		gsMap.init(map, callback);
		
		$(window).resize(function() {
			omapControl.layout();
		});
		
		setTimeout(function() {
			$(window).trigger('resize');
		}, 1000);

	});
</script>
